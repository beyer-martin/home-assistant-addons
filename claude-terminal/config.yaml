---
name: "Claude Terminal"
description: "Claude Code with Remote Control for mobile access and Home Assistant MCP integration"
version: "2.0.0"
slug: "claude_terminal"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# External resources
url: "https://github.com/anthropics/claude-code"

# Web interface configuration
ingress: true
ingress_port: 7681
panel_icon: mdi:code-braces
panel_title: "Claude Terminal"
panel_admin: true

# Port configuration
ports:
  7681/tcp: 7681
ports_description:
  7681/tcp: "Web terminal (not required for ingress)"

# Add-on configuration options
options:
  remote_control_mode:
    name: "Remote Control Mode"
    description: "Enable Remote Control server for mobile access (requires Pro/Max/Team/Enterprise subscription)"
  session_name:
    name: "Session Name"
    description: "Custom name for Remote Control session (optional)"
  enable_mcp_integration:
    name: "Enable MCP Integration"
    description: "Auto-configure connection to Home Assistant MCP Server"
  mcp_access_token:
    name: "MCP Access Token"
    description: "Long-lived access token from Home Assistant (Profile → Security → Create Token)"
  mcp_server_url:
    name: "MCP Server URL"
    description: "Override MCP server URL (default: auto-discover). Example: http://homeassistant.local:8123/mcp_server/sse"
schema:
  remote_control_mode: bool?
  session_name: str?
  enable_mcp_integration: bool?
  mcp_access_token: password?
  mcp_server_url: str?

# Volume mappings for file access
map:
  - config:rw    # Access to Home Assistant configuration files

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7681]/
